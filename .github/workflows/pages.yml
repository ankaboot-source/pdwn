name: Pages

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "website/**"
      - "scripts/update-release-data.mjs"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build release metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_JSON_PATH: website/data/release.json
        run: node scripts/update-release-data.mjs

      - name: Sync brand assets into website bundle
        run: mkdir -p website/assets/brand website/assets/screenshots && cp assets/pdwn-logo.png website/assets/brand/pdwn-logo.png && cp assets/pdwn-wordmark.png website/assets/brand/pdwn-wordmark.png && [ -f assets/pdwn-screenshot-clean.png ] && cp assets/pdwn-screenshot-clean.png website/assets/screenshots/pdwn-screenshot-clean.png || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

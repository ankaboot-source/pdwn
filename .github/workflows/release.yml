name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage
            artifact_pattern: "*.AppImage"
          - os: windows-latest
            bundle: msi
            artifact_pattern: "*.msi"
          - os: macos-latest
            bundle: dmg
            artifact_pattern: "*.dmg"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libglib2.0-dev webkit2gtk-4.1 libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun tauri build --bundles ${{ matrix.bundle }}

      - name: Collect release bundles
        shell: bash
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          matched=0
          for file in src-tauri/target/release/bundle/${{ matrix.bundle }}/${{ matrix.artifact_pattern }}; do
            cp "$file" release-assets/
            matched=1
          done
          if [ "$matched" -eq 0 ]; then
            echo "No artifacts found for pattern ${{ matrix.artifact_pattern }}"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}
          path: release-assets/*

  publish-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * | sort > SHA256SUMS.txt

      - name: Sign checksum manifest
        shell: bash
        run: |
          cosign sign-blob --yes \
            --output-signature release-assets/SHA256SUMS.txt.sig \
            --output-certificate release-assets/SHA256SUMS.txt.pem \
            release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
